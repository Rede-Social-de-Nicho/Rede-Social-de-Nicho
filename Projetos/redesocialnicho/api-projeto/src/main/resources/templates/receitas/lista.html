<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head('Lista de Receitas')}"></head>

<body>
    <header th:replace="~{fragments/layout :: cabecalho}"></header>

    <main>
        <h2>Receitas Partilhadas</h2>
        
        <div style="margin-bottom: 20px; text-align: center;">
            <a th:href="@{/receitas/novo}" style="background-color: #4CAF50; color: white; padding: 10px 15px; text-decoration: none; border-radius: 5px; font-weight: bold;">+ Nova Receita</a>
        </div>
        
        <table border="1" style="margin: 0 auto; width: 90%; text-align: left; border-collapse: collapse;">
            <thead style="background-color: #ff7e5f; color: white;">
                <tr>
                    <th style="padding: 10px;">ID</th>
                    <th style="padding: 10px;">Título</th>
                    <th style="padding: 10px;">Ingredientes</th>
                    <th style="padding: 10px;">Passo a Passo</th>
                    <th style="padding: 10px;">Autor</th>
                    <th style="padding: 10px;">Avaliação</th>
                    <th style="padding: 10px; text-align: center;">Ações</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="receita : ${listaDeReceitas}">
                    <td style="padding: 10px;" th:text="${receita.id}">1</td>
                    <td style="padding: 10px;" th:text="${receita.titulo}">Bolo</td>
                    <td style="padding: 10px;" th:text="${receita.ingredientes}">Ingredientes</td>
                    <td style="padding: 10px;" th:text="${receita.passoApasso}">Passos</td>
                    <td style="padding: 10px;" th:text="${receita.nomeAutor}">Nome do Autor</td>
                    <td style="padding: 10px;" th:text="${receita.mediaAvaliacao}">0.0</td>
                    
                    <td style="padding: 10px; text-align: center; white-space: nowrap;">
                        <a th:href="@{/receitas/editar/{id}(id=${receita.id})}" 
                           style="color: white; background-color: #2196F3; padding: 5px 10px; text-decoration: none; border-radius: 3px; font-size: 14px; margin-right: 5px;">
                           Editar
                        </a>
                        
                        <a th:href="@{/receitas/deletar/{id}(id=${receita.id})}" 
                           style="color: white; background-color: #f44336; padding: 5px 10px; text-decoration: none; border-radius: 3px; font-size: 14px;"
                           onclick="return confirm('Tem certeza que deseja excluir esta receita?');">
                           Excluir
                        </a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(listaDeReceitas)}">
                    <td colspan="7" style="text-align: center; padding: 20px;">Ainda não existem receitas partilhadas.</td>
                </tr>
            </tbody>
        </table>
    </main>

    <footer th:replace="~{fragments/layout :: rodape}"></footer>
</body>
</html>
