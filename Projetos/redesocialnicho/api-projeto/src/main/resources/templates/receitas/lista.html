<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Lista de Receitas')}"></head>
<body>
    <header th:replace="~{fragments/layout :: cabecalho}"></header>

    <main style="max-width: 1000px; margin: 0 auto;">
        <h2 style="text-align: center; color: #333; margin-bottom: 20px;">Receitas Partilhadas</h2>

        <div th:if="${mensagem}" style="padding: 15px; background: #d4edda; color: #155724; border-radius: 5px; margin-bottom: 20px;" th:text="${mensagem}"></div>
        <div th:if="${mensagemErro}" style="padding: 15px; background: #f8d7da; color: #721c24; border-radius: 5px; margin-bottom: 20px;" th:text="${mensagemErro}"></div>

        <div style="text-align: center; margin-bottom: 20px;">
            <a th:href="@{/receitas/novo}" style="background-color: #4CAF50; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px; font-weight: bold;">+ Nova Receita</a>
        </div>

        <div th:if="${#lists.isEmpty(listaDeReceitas)}" style="text-align: center; padding: 40px; background-color: #fff; border: 2px dashed #ff7e5f; border-radius: 10px; color: #555; margin-top: 20px;">
            <h3 style="margin-bottom: 10px;">Ainda não temos nenhuma receita por aqui! 🍳</h3>
            <p>Seja o primeiro a compartilhar uma delícia com a comunidade clicando no botão verde acima.</p>
        </div>

        <table th:unless="${#lists.isEmpty(listaDeReceitas)}" style="width: 100%; border-collapse: collapse; margin-top: 20px; background-color: white; box-shadow: 0 4px 8px rgba(0,0,0,0.05);">
            <thead>
                <tr style="background-color: #ff7e5f; color: white;">
                    <th style="padding: 12px; border: 1px solid #ddd;">ID</th>
                    <th style="padding: 12px; border: 1px solid #ddd;">Título</th>
                    <th style="padding: 12px; border: 1px solid #ddd;">Autor</th>
                    <th style="padding: 12px; border: 1px solid #ddd;">Avaliação</th>
                    <th style="padding: 12px; border: 1px solid #ddd; text-align: center;">Ações</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="receita : ${listaDeReceitas}" style="border-bottom: 1px solid #eee;">
                    <td style="padding: 12px; border: 1px solid #ddd; text-align: center;" th:text="${receita.id}"></td>
                    <td style="padding: 12px; border: 1px solid #ddd;" th:text="${receita.titulo}"></td>
                    <td style="padding: 12px; border: 1px solid #ddd; text-align: center;" th:text="${receita.autor != null ? receita.autor.nomeUsuario : 'Desconhecido'}"></td>
                    
                    <td style="padding: 12px; border: 1px solid #ddd; text-align: center;">
                        <span th:if="${receita.mediaAvaliacao == 0}" style="color: #999; font-size: 0.9em; font-style: italic;">Sem avaliações</span>
                        
                        <div th:unless="${receita.mediaAvaliacao == 0}" style="display: flex; align-items: center; justify-content: center; gap: 8px;">
                            <div style="display: inline-block; position: relative; font-size: 1.4em; color: #e0e0e0; letter-spacing: 1px;">
                                ★★★★★
                                <div th:style="'position: absolute; top: 0; left: 0; white-space: nowrap; overflow: hidden; color: #FFD700; width: ' + (${receita.mediaAvaliacao * 20}) + '%;'">
                                    ★★★★★
                                </div>
                            </div>
                            <span style="font-size: 0.9em; color: #555; font-weight: bold; margin-top: 3px;" th:text="'(' + ${#lists.size(receita.avaliacoes)} + ')'"></span>
                        </div>
                    </td>

                    <td style="padding: 10px; border: 1px solid #ddd; text-align: center;">
                        <a th:href="@{/receitas/detalhes/{id}(id=${receita.id})}" style="background-color: #9C27B0; color: white; padding: 5px 10px; text-decoration: none; border-radius: 3px;">Ver e Avaliar</a>
                        <a th:href="@{/receitas/editar/{id}(id=${receita.id})}" style="background-color: #2196F3; color: white; padding: 5px 10px; text-decoration: none; border-radius: 3px; margin: 0 5px;">Editar</a>
                        <a th:href="@{/receitas/deletar/{id}(id=${receita.id})}" style="background-color: #f44336; color: white; padding: 5px 10px; text-decoration: none; border-radius: 3px;" onclick="return confirm('Excluir?');">Excluir</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </main>

    <footer th:replace="~{fragments/layout :: rodape}"></footer>
</body>
</html>
