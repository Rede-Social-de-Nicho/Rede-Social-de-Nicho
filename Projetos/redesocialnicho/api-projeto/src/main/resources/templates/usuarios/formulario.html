<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head('Editar Usuário')}"></head>

<body>
    <header th:replace="~{fragments/layout :: cabecalho}"></header>

    <main>
        <div style="max-width: 500px; margin: 0 auto; padding: 30px; border: 1px solid #ff7e5f; border-radius: 10px; background-color: white; box-shadow: 0 4px 8px rgba(0,0,0,0.05); text-align: left;">
            
            <h2 style="color: #333; text-align: center; margin-bottom: 25px;">Editar Usuário</h2>
            
            <form th:action="@{/usuarios/salvar}" th:object="${usuario}" method="post" style="display: flex; flex-direction: column; gap: 15px;">
                
                <input type="hidden" th:field="*{id}">

                <div>
                    <label style="font-weight: bold; color: #555;">Nome de Usuário:</label><br>
                    <input type="text" th:field="*{nomeUsuario}" required style="width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box;">
                </div>

                <div>
                    <label style="font-weight: bold; color: #555;">E-mail:</label><br>
                    <input type="email" th:field="*{email}" required style="width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box;">
                </div>

                <div>
                    <label style="font-weight: bold; color: #555;">Senha:</label><br>
                    <input type="password" th:field="*{senhaHash}" style="width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box;">
                </div>

                <div style="display: flex; align-items: center; gap: 10px; margin-top: 10px;">
                    <input type="checkbox" th:field="*{eAdm}" id="admin" style="transform: scale(1.2);">
                    <label for="admin" style="font-weight: bold; color: #555; cursor: pointer;">É Administrador?</label>
                </div>

                <div style="display: flex; justify-content: space-between; margin-top: 20px; gap: 15px;">
                    <a th:href="@{/usuarios/lista}" style="padding: 12px; background-color: #ccc; color: #333; text-decoration: none; border-radius: 5px; font-weight: bold; text-align: center; flex: 1;">Cancelar</a>
                    <button type="submit" style="background-color: #ff7e5f; color: white; padding: 12px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; flex: 1;">Salvar Usuário</button>
                </div>
            </form>
        </div>
    </main>

    <footer th:replace="~{fragments/layout :: rodape}"></footer>
</body>
</html>
