<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nova Avaliação</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">

    <div class="card">
        <div class="card-header bg-primary text-white">
            <h2>Avaliar Receita</h2>
        </div>
        <div class="card-body">
            <form th:action="@{/avaliacoes/salvar}" method="post">
                
                <div class="mb-3">
                    <label class="form-label">Usuário:</label>
                    <select name="usuarioId" class="form-select" required>
                        <option value="">Selecione quem está avaliando...</option>
                        <option th:each="u : ${usuarios}" 
                                th:value="${u.id}" 
                                th:text="${u.nomeUsuario}"></option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Receita:</label>
                    <select name="receitaId" class="form-select" required>
                        <option value="">Qual receita deseja avaliar?</option>
                        <option th:each="r : ${receitas}" 
                                th:value="${r.id}" 
                                th:text="${r.nome}"></option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Nota (1 a 5 estrelas):</label>
                    <input type="number" name="estrelas" class="form-control" min="1" max="5" required>
                </div>

                <div class="mt-4">
                    <button type="submit" class="btn btn-success">Enviar Avaliação</button>
                    <a th:href="@{/receitas/lista}" class="btn btn-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>

</body>
</html>
