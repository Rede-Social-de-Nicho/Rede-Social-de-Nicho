<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nova Avaliação</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">Avaliar Receita</h4>
                </div>
                <div class="card-body">
                    
                    <div th:if="${mensagemErro}" class="alert alert-danger" role="alert">
                        <span th:text="${mensagemErro}"></span>
                    </div>

                    <form th:action="@{/avaliacoes/salvar}" method="post">
                        
                        <div class="mb-3">
                            <label class="form-label fw-bold">Quem está avaliando?</label>
                            <select name="usuarioId" class="form-select" required>
                                <option value="">Selecione o usuário...</option>
                                <option th:each="u : ${usuarios}" 
                                        th:value="${u.id}" 
                                        th:text="${u.nomeUsuario}"></option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Qual receita?</label>
                            <select name="receitaId" class="form-select" required>
                                <option value="">Selecione a receita...</option>
                                <option th:each="r : ${receitas}" 
                                        th:value="${r.id}" 
                                        th:text="${r.titulo}"></option>
                            </select>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold">Nota (Estrelas):</label>
                            <input type="number" name="estrelas" class="form-control" min="1" max="5" placeholder="De 1 a 5" required>
                        </div>

                        <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                            <a th:href="@{/avaliacoes/lista}" class="btn btn-outline-secondary">Cancelar</a>
                            <button type="submit" class="btn btn-success">Salvar Avaliação</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
