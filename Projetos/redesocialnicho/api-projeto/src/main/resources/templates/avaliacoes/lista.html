<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lista de Avaliações</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Avaliações da Rede Social</h2>
        <a th:href="@{/avaliacoes/novo}" class="btn btn-primary">Nova Avaliação</a>
    </div>

    <div th:if="${mensagem}" class="alert alert-success" th:text="${mensagem}"></div>
    <div th:if="${mensagemErro}" class="alert alert-danger" th:text="${mensagemErro}"></div>

    <table class="table table-striped table-hover">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Usuário</th>
                <th>Receita</th>
                <th>Estrelas</th>
                <th>Data</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="av : ${avaliacoes}">
                <td th:text="${av.id}"></td>
                <td th:text="${av.usuario.nomeUsuario}"></td>
                <td th:text="${av.receita.nome}"></td>
                <td>
                    <span th:each="i : ${#numbers.sequence(1, av.estrelas)}">⭐</span>
                </td>
                <td th:text="${#temporals.format(av.dataAvaliacao, 'dd/MM/yyyy HH:mm')}"></td>
            </tr>
            <tr th:if="${#lists.isEmpty(avaliacoes)}">
                <td colspan="5" class="text-center">Nenhuma avaliação encontrada.</td>
            </tr>
        </tbody>
    </table>

    <div class="mt-3">
        <a th:href="@{/receitas/lista}" class="btn btn-outline-secondary">Voltar para Receitas</a>
    </div>

</body>
</html>
