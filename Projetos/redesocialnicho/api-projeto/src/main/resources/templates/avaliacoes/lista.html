<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lista de Avaliações</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body class="bg-light">

<div class="container mt-5">
    
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Avaliações Registradas</h2>
        <a th:href="@{/avaliacoes/novo}" class="btn btn-primary">+ Nova Avaliação</a>
    </div>

    <div th:if="${mensagem}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${mensagem}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div class="card shadow-sm">
        <div class="card-body p-0">
            <table class="table table-hover table-striped mb-0">
                <thead class="table-dark">
                    <tr>
                        <th class="ps-3">ID</th>
                        <th>Usuário</th>
                        <th>Receita</th>
                        <th>Nota</th>
                        <th>Data e Hora</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="av : ${avaliacoes}">
                        <td class="ps-3" th:text="${av.id}"></td>
                        <td th:text="${av.usuario.nomeUsuario}"></td>
                        <td th:text="${av.receita.titulo}"></td>
                        
                        <td class="text-warning fs-5">
                            <i th:class="${av.estrelas >= 1 ? 'bi bi-star-fill' : 'bi bi-star'}"></i>
                            <i th:class="${av.estrelas >= 2 ? 'bi bi-star-fill' : 'bi bi-star'}"></i>
                            <i th:class="${av.estrelas >= 3 ? 'bi bi-star-fill' : 'bi bi-star'}"></i>
                            <i th:class="${av.estrelas >= 4 ? 'bi bi-star-fill' : 'bi bi-star'}"></i>
                            <i th:class="${av.estrelas >= 5 ? 'bi bi-star-fill' : 'bi bi-star'}"></i>
                        </td>
                        
                        <td th:text="${#temporals.format(av.dataAvaliacao, 'dd/MM/yyyy HH:mm')}"></td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(avaliacoes)}">
                        <td colspan="5" class="text-center py-4 text-muted">Ainda não há nenhuma avaliação cadastrada no sistema.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    
    <div class="mt-4">
        <a href="/" class="btn btn-secondary">Voltar para o Início</a>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
